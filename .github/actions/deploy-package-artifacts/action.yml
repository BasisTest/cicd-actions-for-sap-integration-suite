# 1.0.0 - 2025-11-24 - Initial release (O. Weng)
# 1.1.0 - 2026-03-06 - Read and log LogLevel and Runtimes from enhanced deploytask entries (F. Spruenken)
# 1.2.0 - 2026-05-19 - Apply MPL log level after deployment; only set for ERROR/WARN/NONE; abort on failure with disable hint (O. Weng)
