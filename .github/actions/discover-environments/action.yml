# 1.1.0 - 2026-05-27 - Fully dynamic: return all non-github-pages environments sorted alphabetically; remove known-stages (O.Weng)
# 1.4.0 - 2026-05-28 - Filter by required variables; only environments with all required vars defined are returned (O.Weng)
