#
# Version History:
# 1.0.0 - 2026-05-06 - Initial release with popup menus, role filter, compact grouped table layout; hide iflows with no role
# 1.2.1 - 2026-05-20 - Remove project-specific DBF hint from role filter placeholder (O.Weng)
