name: Download CPI Package into GIT

on:
  workflow_call:
    inputs:
      workflow-ref:
        description: "GIT Reference Workflow should run in"
        required: true
        type: string
      source-env:
        description: "Source Environment"
        required: true
        type: string
      target-ref:
        description: "GIT Target Reference"
        required: true
        type: string
      ids:
        description: "IDs (1..n) to be downloaded"
        required: true
        type: string
      mode:
        description: "Mode IntegrationPackages/PartnerDirectory"
        required: true
        type: string
      commit-message:
        description: "Commit Message"
        required: true
        type: string
      btp-api-user:
        description: "BTP Service Key (ClientID) to access Token Endpoint"
        required: true
        type: string
      btp-tec-user:
        description: "BTP technical User with Access Policy for Integration Suite"
        required: true
        type: string
      btp-token-url:
        description: "URL on BTP to request Token"
        required: true
        type: string
      btp-api-url:
        description: "URL on BTP to access APIs"
        required: true
        type: string
      git-cicd-orgrepo:
        description: "Remote GIT Org/Repo for CICD"
        required: true
        type: string
        
    secrets:
      BTP_API_PASSWORD:
        description: "Client Secret for API User"
        required: true
      BTP_TEC_PASSWORD:
        description: "Password of technical User"
        required: true
      GIT_CICD_TOKEN:
        description: "GIT Token of remote CICD Repo (fallback — superseded by GIT_CICD_APP_ID + GIT_CICD_APP_PRIVATE_KEY)"
        required: false
      GIT_CICD_APP_PRIVATE_KEY:
        description: "GitHub App private key PEM for CICD reader app (preferred — used together with GIT_CICD_APP_ID variable)"
        required: false
          
permissions:
  contents: write

jobs:
  preparation:
    name: Prepare ${{ inputs.mode }} ID(s) 
    runs-on: ${{ vars.RUNS_ON && fromJson(vars.RUNS_ON) || 'ubuntu-latest' }}
    environment: ${{ inputs.source-env }}
    outputs:
      ids-json: ${{ steps.parse-ids.outputs.ids-json }}		

    steps:
      - name: Parse IDs
        id: parse-ids
        run: |
          # Convert comma-separated string to JSON array
          IFS=',' read -ra IDS <<< "${{ inputs.ids }}"
          JSON_ARRAY="["
          for i in "${!IDS[@]}"; do
          # Trim whitespace
          ID=$(echo "${IDS[$i]}" | xargs)
          if [ $i -gt 0 ]; then
          JSON_ARRAY="${JSON_ARRAY},"
          fi
          JSON_ARRAY="${JSON_ARRAY}\"${ID}\""
          done
          JSON_ARRAY="${JSON_ARRAY}]"
          echo "ids-json=${JSON_ARRAY}" >> $GITHUB_OUTPUT
          
          cat $GITHUB_OUTPUT

  download-id:
    needs: preparation
    name: ${{ matrix.id }}
    runs-on: ${{ vars.RUNS_ON && fromJson(vars.RUNS_ON) || 'ubuntu-latest' }}
    environment: ${{ inputs.source-env }}
    strategy:
      max-parallel: 1
      matrix:
        id: ${{ fromJson(needs.preparation.outputs.ids-json) }}

    steps:
      # ─── Token resolution (GitHub App preferred, PAT fallback) ───
      - name: Resolve CICD org
        id: cicd-org
        shell: bash
        env:
          ORGREPO: ${{ inputs.git-cicd-orgrepo }}
        run: echo "owner=${ORGREPO%%/*}" >> $GITHUB_OUTPUT

      - name: Generate GitHub App token
        id: app-token-cicd
        if: ${{ vars.GIT_CICD_APP_ID != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GIT_CICD_APP_ID }}
          private-key: ${{ secrets.GIT_CICD_APP_PRIVATE_KEY }}
          owner: ${{ steps.cicd-org.outputs.owner }}

      - name: Resolve CICD token
        id: cicd-token
        shell: bash
        env:
          APP_TOKEN: ${{ steps.app-token-cicd.outputs.token }}
          PAT_TOKEN: ${{ secrets.GIT_CICD_TOKEN }}
        run: |
          TOKEN="${APP_TOKEN:-$PAT_TOKEN}"
          [ -z "$TOKEN" ] && echo "🛑 No CICD token: set GIT_CICD_APP_ID variable + GIT_CICD_APP_PRIVATE_KEY secret, or set GIT_CICD_TOKEN" && exit 1
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Checkout cicd-actions-intsuite repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.git-cicd-orgrepo }}
          path: cicd-btp-insuite
          token: ${{ steps.cicd-token.outputs.token }}
          ref: ${{ inputs.workflow-ref }}

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target-ref }}
          path: btp-insuite

      - name: Check dir ${{ inputs.mode }}
        run: |
          if [ ! -d "btp-insuite/${{ inputs.mode }}" ]; then
            echo "🚫 Directory btp-insuite/${{ inputs.mode }} not found. Creating it..."
            mkdir -p btp-insuite/${{ inputs.mode }}
          else
            echo "✅ Directory btp-insuite/${{ inputs.mode }} found." 
          fi
     
      - name: Request OAuth Token
        id: get-token
        uses: ./cicd-btp-insuite/.github/actions/get-token
        with:
          btp-api-user: ${{ inputs.btp-api-user }}
          btp-tec-user: ${{ inputs.btp-tec-user }}
          btp-token-url: ${{ inputs.btp-token-url }}
          BTP_API_PASSWORD: ${{ secrets.BTP_API_PASSWORD }}
          BTP_TEC_PASSWORD: ${{ secrets.BTP_TEC_PASSWORD }}

      - name: Download Partner Directory
        if: ${{ inputs.mode == 'PartnerDirectory' }}
        uses: ./cicd-btp-insuite/.github/actions/download-pid
        with:
          bearer-token: ${{ steps.get-token.outputs.token }}
          partner-id: ${{ matrix.id }}
          btp-api-url: ${{ inputs.btp-api-url }}
          output-dir: /tmp/pd-download

      - name: Convert Partner Directory to Git Structure
        if: ${{ inputs.mode == 'PartnerDirectory' }}
        uses: ./cicd-btp-insuite/.github/actions/convert-pid-to-git
        with:
          partner-id: ${{ matrix.id }}
          input-dir: /tmp/pd-download
          output-dir: btp-insuite/PartnerDirectory

      - name: Download Package
        if: ${{ inputs.mode == 'IntegrationPackages' }}
        uses: ./cicd-btp-insuite/.github/actions/download-package
        with:
          bearer-token: ${{ steps.get-token.outputs.token }}
          package-id: ${{ matrix.id }}
          btp-api-url: ${{ inputs.btp-api-url }}
        
      - name: Run tests
        uses: ./cicd-btp-insuite/.github/actions/call-cx-run-tests
        with:
          cx-active: ${{ vars.CX_RUN_TESTS }}
          intsuite-repo-path: intsuite-repo
          extension-repo-path: cx-extension-repo
          cx-repository: ${{ vars.CX_REPOSITORY }}
          cx-repository-ref: ${{ vars.CX_REPOSITORY_REF || 'main' }}
          git-cicd-token: ${{ steps.cicd-token.outputs.token }}
          target-ref: ${{ inputs.target-ref }}
          package-id: ${{ matrix.id }}
          btp-api-url: ${{ inputs.btp-api-url }}
          bearer-token: ${{ steps.get-token.outputs.token }}
          mode: ${{ inputs.mode }}
 
      - name: GIT Commit
        id: git-commit
        uses: ./cicd-btp-insuite/.github/actions/git-commit
        with:
          comment: ${{ inputs.commit-message }}