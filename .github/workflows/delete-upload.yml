# 1.0.1 - 2026-01-26 - Introduce environment variable RUNS_ON (O. Weng)
# 1.0.2 - 2026-02-25 - Add exclude-iflow-ids parameter to exclude specific IFLOWs from deployment (O. Weng)
# 1.1.0 - 2026-02-27 - Add btp-eic-runtimes parameter for Edge Integration Cell support (O. Weng)
# 1.2.0 - 2026-04-24 - Move cx-derive-iflow-exclusions into btp-update-runtime job for fresh data on restart (O. Weng)
# 1.3.0 - 2026-05-05 - Add btp-eic-url-template parameter; EIC URL path not yet published — subject to change
# 1.3.1 - 2026-05-19 - Add enable-set-log-level pass-through to update-runtime (O. Weng)
