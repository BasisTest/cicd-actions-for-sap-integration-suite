# 1.0.2 - 2026-05-21 - Add explicit permissions block for GITHUB_TOKEN hardening; split GitHub App into CICD reader (GIT_CICD_APP_ID) and consumer bot (GIT_GITHUB_APP_ID) (O.Weng)
# 1.1.0 - 2026-05-21 - Add enable-set-log-level input; rename iflow-deploy to evaluate-deployment; resolve deploy task via resolve-iflow-deploy-task action; fix env-aware deploy flag (O.Weng)
