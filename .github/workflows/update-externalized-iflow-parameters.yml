name: Update Externalized Parameters For IFlow

on:
  workflow_call:
    inputs:
      workflow-ref:
        description: "GIT Reference Workflow should run in"
        required: true
        type: string
      target-env:
        description: "Environment"
        required: true
        type: string
      iflow-id:
        description: "IFlow ID"
        required: true
        type: string
      evaluate-deployment:
        description: "Evaluate Deployment_INTEGRATION_FLOW.json and trigger deployment based on its configuration"
        required: true
        type: string
      source-ref:
        description: "Source Reference (e.g. main)"
        required: true
        type: string        
      btp-api-user:
        description: "BTP API User"
        required: true
        type: string
      btp-tec-user:
        description: "BTP TEC User"
        required: true
        type: string
      btp-token-url:
        description: "BTP Token URL"
        required: true
        type: string    
      btp-api-url:
        description: "BTP API URL"
        required: true
        type: string
      git-cicd-orgrepo:
        description: "Remote GIT Org/Repo for CICD"
        required: true
        type: string
      enable-set-log-level:
        description: "Set MPL log level after deployment (uses undocumented API — disable via BTP_SET_LOG_LEVEL=false if endpoint breaks)"
        required: false
        type: string
        default: "true"
    secrets:
       BTP_API_PASSWORD:
        required: true
       BTP_TEC_PASSWORD:
        required: true
       GIT_CICD_TOKEN:
         description: "GIT Token of remote CICD Repo (fallback — superseded by GIT_CICD_APP_ID + GIT_CICD_APP_PRIVATE_KEY)"
         required: false
       GIT_CICD_APP_PRIVATE_KEY:
         description: "GitHub App private key PEM for CICD reader app (preferred — used together with GIT_CICD_APP_ID variable)"
         required: false

permissions:
  contents: read

jobs:
  update-externalized-parameters-for-iflow:
    name: Update IFLOW ${{ inputs.iflow-id }}
    runs-on: ${{ vars.RUNS_ON && fromJson(vars.RUNS_ON) || 'ubuntu-latest' }}
    environment: ${{ inputs.target-env }}
    outputs:
      package-id: ${{ steps.get-packageid-for-iflow.outputs.packageID }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source-ref }}
          path: btp-insuite

      # ─── Token resolution (GitHub App preferred, PAT fallback) ───
      - name: Resolve CICD org
        id: cicd-org
        shell: bash
        env:
          ORGREPO: ${{ inputs.git-cicd-orgrepo }}
        run: echo "owner=${ORGREPO%%/*}" >> $GITHUB_OUTPUT

      - name: Generate GitHub App token
        id: app-token-cicd
        if: ${{ vars.GIT_CICD_APP_ID != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GIT_CICD_APP_ID }}
          private-key: ${{ secrets.GIT_CICD_APP_PRIVATE_KEY }}
          owner: ${{ steps.cicd-org.outputs.owner }}

      - name: Resolve CICD token
        id: cicd-token
        shell: bash
        env:
          APP_TOKEN: ${{ steps.app-token-cicd.outputs.token }}
          PAT_TOKEN: ${{ secrets.GIT_CICD_TOKEN }}
        run: |
          TOKEN="${APP_TOKEN:-$PAT_TOKEN}"
          [ -z "$TOKEN" ] && echo "🛑 No CICD token: set GIT_CICD_APP_ID variable + GIT_CICD_APP_PRIVATE_KEY secret, or set GIT_CICD_TOKEN" && exit 1
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Checkout cicd-actions-intsuite repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.git-cicd-orgrepo }}
          ref: ${{ inputs.workflow-ref }}
          path: cicd-btp-insuite
          token: ${{ steps.cicd-token.outputs.token }}

      - name: Request OAuth Token
        id: get-token
        uses: ./cicd-btp-insuite/.github/actions/get-token
        with:
          btp-api-user: ${{ inputs.btp-api-user }}
          btp-tec-user: ${{ inputs.btp-tec-user }}
          btp-token-url: ${{ inputs.btp-token-url }}
          BTP_API_PASSWORD: ${{ secrets.BTP_API_PASSWORD }}
          BTP_TEC_PASSWORD: ${{ secrets.BTP_TEC_PASSWORD }}

      - name: Get PackageID for IFlow
        id: get-packageid-for-iflow
        uses: ./cicd-btp-insuite/.github/actions/get-packageid-for-iflow
        with:
          bearer-token: ${{ steps.get-token.outputs.token }}
          btp-api-url: ${{ inputs.btp-api-url }}
          iflow-id: '${{ inputs.iflow-id }}'

      - name: Update Configuration Parameters
        id: update-config-params
        uses: ./cicd-btp-insuite/.github/actions/update-config-parameters
        with:
          package-id: '${{ steps.get-packageid-for-iflow.outputs.packageID }}'
          bearer-token: ${{ steps.get-token.outputs.token }}
          btp-api-url: ${{ inputs.btp-api-url }}
          target-env: '${{ inputs.target-env }}'
          iflow-id: '${{ inputs.iflow-id }}'

  deploy-iflow:
    needs: update-externalized-parameters-for-iflow
    name: Deploy IFLOW ${{ inputs.iflow-id }}
    if: inputs.evaluate-deployment == 'true'
    runs-on: ${{ vars.RUNS_ON && fromJson(vars.RUNS_ON) || 'ubuntu-latest' }}
    environment: ${{ inputs.target-env }}

    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source-ref }}
          path: btp-insuite

      # ─── Token resolution (GitHub App preferred, PAT fallback) ───
      - name: Resolve CICD org
        id: cicd-org
        shell: bash
        env:
          ORGREPO: ${{ inputs.git-cicd-orgrepo }}
        run: echo "owner=${ORGREPO%%/*}" >> $GITHUB_OUTPUT

      - name: Generate GitHub App token
        id: app-token-cicd
        if: ${{ vars.GIT_CICD_APP_ID != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GIT_CICD_APP_ID }}
          private-key: ${{ secrets.GIT_CICD_APP_PRIVATE_KEY }}
          owner: ${{ steps.cicd-org.outputs.owner }}

      - name: Resolve CICD token
        id: cicd-token
        shell: bash
        env:
          APP_TOKEN: ${{ steps.app-token-cicd.outputs.token }}
          PAT_TOKEN: ${{ secrets.GIT_CICD_TOKEN }}
        run: |
          TOKEN="${APP_TOKEN:-$PAT_TOKEN}"
          [ -z "$TOKEN" ] && echo "🛑 No CICD token: set GIT_CICD_APP_ID variable + GIT_CICD_APP_PRIVATE_KEY secret, or set GIT_CICD_TOKEN" && exit 1
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Checkout cicd-actions-intsuite repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.git-cicd-orgrepo }}
          ref: ${{ inputs.workflow-ref }}
          path: cicd-btp-insuite
          token: ${{ steps.cicd-token.outputs.token }}

      - name: Request OAuth Token
        id: get-token
        uses: ./cicd-btp-insuite/.github/actions/get-token
        with:
          btp-api-user: ${{ inputs.btp-api-user }}
          btp-tec-user: ${{ inputs.btp-tec-user }}
          btp-token-url: ${{ inputs.btp-token-url }}
          BTP_API_PASSWORD: ${{ secrets.BTP_API_PASSWORD }}
          BTP_TEC_PASSWORD: ${{ secrets.BTP_TEC_PASSWORD }}

      - name: Resolve IFlow Deploy Task
        id: deployment-file
        uses: ./cicd-btp-insuite/.github/actions/resolve-iflow-deploy-task
        with:
          package-id: ${{ needs.update-externalized-parameters-for-iflow.outputs.package-id }}
          iflow-id: ${{ inputs.iflow-id }}
          target-env: ${{ inputs.target-env }}

      - name: Deploy Package Artifacts
        uses: ./cicd-btp-insuite/.github/actions/deploy-package-artifacts
        with:
          bearer-token: ${{ steps.get-token.outputs.token }}
          btp-api-url: ${{ inputs.btp-api-url }}
          file: ${{ steps.deployment-file.outputs.file }}
          action: Deploy
          enable-set-log-level: ${{ inputs.enable-set-log-level }}
